<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Números Primos</title>
    <!-- Importamos Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importamos Canvas Confetti para las explosiones y celebraciones -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Estilos personalizados para la animación de fondo y efectos neón -->
    <style>
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
        .floating-number {
            position: fixed;
            font-family: monospace;
            font-weight: bold;
            z-index: -1;
            pointer-events: none;
            animation: floatUp linear forwards;
        }
        .neon-box {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4), 0 0 40px rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.6);
        }
    </style>
</head>
<body class="bg-gray-950 flex items-center justify-center min-h-screen p-4 font-sans text-slate-200 overflow-hidden relative">

    <!-- Contenedor para los números de fondo en movimiento -->
    <div id="background-numbers"></div>

    <!-- Contenedor principal (Tarjeta con efecto Neón) -->
    <div class="bg-gray-900/80 backdrop-blur-md p-8 rounded-2xl max-w-md w-full text-center neon-box relative z-10">
        
        <!-- Icono decorativo -->
        <div class="mx-auto bg-purple-900/50 w-16 h-16 rounded-full flex items-center justify-center mb-6 border border-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.6)]">
            <svg class="w-8 h-8 text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
            </svg>
        </div>

        <h1 class="text-3xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 drop-shadow-[0_0_10px_rgba(168,85,247,0.5)]">Verificador de Primos</h1>
        <p class="text-gray-400 mb-6 text-sm">Ingresa un número entero para descubrir si es un número primo o no.</p>
        
        <!-- Campo de entrada -->
        <input 
            type="number" 
            id="numberInput" 
            class="w-full bg-gray-950 border-2 border-purple-500/50 rounded-xl p-4 mb-4 focus:outline-none focus:border-cyan-400 focus:shadow-[0_0_15px_rgba(34,211,238,0.5)] transition-all text-center text-2xl font-bold text-white placeholder-gray-700" 
            placeholder="Ej. 7, 12, 97..."
            onkeypress="handleKeyPress(event)"
        >
        
        <!-- Botón de acción -->
        <button 
            onclick="checkPrime()" 
            class="w-full bg-gradient-to-r from-purple-600 to-cyan-600 text-white font-bold py-4 rounded-xl hover:from-purple-500 hover:to-cyan-500 active:transform active:scale-95 transition-all shadow-[0_0_20px_rgba(168,85,247,0.5)]">
            Verificar Número
        </button>
        
        <!-- Área de resultados (oculta por defecto) -->
        <div id="result" class="mt-6 hidden p-4 rounded-xl text-lg font-medium transition-all duration-300"></div>
    </div>

    <!-- Créditos del autor -->
    <div class="fixed bottom-4 right-4 text-xs text-gray-400/80 z-20 text-right backdrop-blur-sm bg-gray-900/30 p-2 rounded-lg border border-purple-500/20 shadow-[0_0_10px_rgba(168,85,247,0.1)]">
        Elaborado por <span class="text-cyan-400/90 font-semibold">Richard Steven García Caucha</span>,<br>asistido por IA
    </div>

    <script>
        // Función principal para determinar si es primo y la razón
        function isPrime(n) {
            // Manejo de casos especiales (menores o iguales a 1)
            if (n <= 1) return { prime: false, reason: "Los números menores o iguales a 1 no son primos por definición." };
            
            // El 2 es el único número primo par
            if (n === 2) return { prime: true, reason: "El 2 es el único número primo que es par." };
            
            // Si es par y mayor que 2, no es primo
            if (n % 2 === 0) return { prime: false, reason: "Es divisible por 2 (es un número par)." };
            
            // Verificamos divisibilidad desde 3 hasta la raíz cuadrada del número
            // Avanzamos de 2 en 2 porque ya descartamos los pares
            for (let i = 3; i <= Math.sqrt(n); i += 2) {
                if (n % i === 0) {
                    return { prime: false, reason: `Es divisible por ${i} ( ${i} × ${n/i} = ${n} ).` };
                }
            }
            
            // Si pasa todas las pruebas, es primo
            return { prime: true, reason: "Solo es divisible por 1 y por sí mismo." };
        }

        // Función que se ejecuta al hacer clic en el botón
        function checkPrime() {
            const inputElement = document.getElementById('numberInput');
            const resultDiv = document.getElementById('result');
            const inputValue = inputElement.value;

            // Validación de entrada vacía o no numérica
            if (inputValue === '' || isNaN(inputValue)) {
                showResult("Por favor, ingresa un número válido.", "error");
                return;
            }

            // Convertimos a entero
            const num = Number(inputValue);

            // Validar que no sea un número con decimales
            if (!Number.isInteger(num)) {
                showResult("Los números primos deben ser enteros. Por favor, ingresa un número sin decimales.", "error");
                return;
            }

            // Calculamos el resultado
            const result = isPrime(num);

            // Efectos de celebración o explosión y mostramos el resultado
            if (result.prime) {
                // Celebración: Confeti de colores neón
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#22d3ee', '#a855f7', '#fbbf24', '#34d399']
                });
                showResult(`¡El número <strong class="text-2xl">${num}</strong> ES PRIMO!<br><span class="text-sm font-normal mt-2 block opacity-90">${result.reason}</span>`, "success");
            } else {
                // Explosión: Partículas rojas veloces
                confetti({
                    particleCount: 200,
                    spread: 100,
                    startVelocity: 50,
                    origin: { y: 0.6 },
                    colors: ['#ef4444', '#dc2626', '#991b1b', '#f97316'],
                    shapes: ['square']
                });
                showResult(`El número <strong class="text-2xl">${num}</strong> NO ES PRIMO.<br><span class="text-sm font-normal mt-2 block opacity-90">${result.reason}</span>`, "error");
            }
        }

        // Función auxiliar para actualizar la interfaz (DOM)
        function showResult(htmlContent, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = htmlContent;
            resultDiv.classList.remove('hidden'); // Mostramos el div
            
            // Limpiamos clases previas
            resultDiv.className = "mt-6 p-5 rounded-xl text-lg font-medium block animate-fade-in ";

            // Aplicamos colores adaptados al modo oscuro/neón
            if (type === "success") {
                resultDiv.classList.add("bg-emerald-900/40", "text-emerald-300", "border", "border-emerald-500", "shadow-[0_0_15px_rgba(16,185,129,0.4)]");
            } else if (type === "warning") {
                resultDiv.classList.add("bg-amber-900/40", "text-amber-300", "border", "border-amber-500", "shadow-[0_0_15px_rgba(245,158,11,0.4)]");
            } else if (type === "error") {
                resultDiv.classList.add("bg-red-900/40", "text-red-300", "border", "border-red-500", "shadow-[0_0_15px_rgba(239,68,68,0.4)]");
            }
        }

        // Permite usar la tecla "Enter" para verificar
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkPrime();
            }
        }

        // --- SISTEMA DE NÚMEROS FLOTANTES DE FONDO ---
        function createFloatingNumber() {
            const container = document.getElementById('background-numbers');
            const numEl = document.createElement('div');
            
            // Generar número aleatorio (0-999)
            numEl.innerText = Math.floor(Math.random() * 1000);
            numEl.className = 'floating-number text-xl md:text-3xl';
            
            // Posición horizontal aleatoria
            numEl.style.left = Math.random() * 100 + 'vw';
            
            // Duración de animación aleatoria
            const duration = Math.random() * 12 + 6;
            numEl.style.animationDuration = duration + 's';
            
            // Tamaño aleatorio
            const scale = Math.random() * 1 + 0.5;
            numEl.style.transform = `scale(${scale})`;

            // Color neón aleatorio (Cian, Púrpura, Verde o Rosa)
            const colors = ['#22d3ee', '#a855f7', '#34d399', '#f472b6'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            numEl.style.color = randomColor;
            numEl.style.textShadow = `0 0 8px ${randomColor}, 0 0 20px ${randomColor}`;

            container.appendChild(numEl);

            // Eliminar elemento cuando termina la animación para no saturar la memoria
            setTimeout(() => {
                numEl.remove();
            }, duration * 1000);
        }

        // Generar números constantemente
        setInterval(createFloatingNumber, 500);

        // Generar algunos números iniciales de inmediato para no esperar a que suban
        for(let i=0; i<20; i++) {
            setTimeout(createFloatingNumber, Math.random() * 4000);
        }
    </script>
</body>
</html>
